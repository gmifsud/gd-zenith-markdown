<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zenith Markdown</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN for Simplicity in this setup) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        important: '#deep-focus-app',
        theme: {
          extend: {
            colors: {
              obsidian: '#1e1e1e',
              surface: '#252525',
              border: '#2A2A2A',
              primary: '#E5E5E5',
              muted: '#A3A3A3',
              accent: '#7C3AED',
              'accent-hover': '#6D28D9',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            typography: (theme) => ({
              DEFAULT: {
                css: {
                  color: theme('colors.primary'),
                  h1: { color: theme('colors.primary') },
                  h2: { color: theme('colors.primary') },
                  h3: { color: theme('colors.primary') },
                  h4: { color: theme('colors.primary') },
                  strong: { color: theme('colors.primary') },
                  code: { color: theme('colors.accent') },
                  a: { color: theme('colors.accent') },
                  blockquote: { 
                    borderLeftColor: theme('colors.accent'),
                    color: theme('colors.muted')
                  },
                },
              },
            }),
          },
        },
      }
    </script>
    <style>
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #333; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #444; 
      }

      body {
        background-color: #1e1e1e;
        color: #E5E5E5;
        overflow: hidden;
      }

      .editor-container { position: relative; width: 100%; height: 100%; overflow: hidden; }
      .editor-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 2rem; margin: 0; border: 0; background: transparent; box-sizing: border-box; overflow-y: auto; white-space: pre-wrap; word-wrap: break-word; font-family: 'JetBrains Mono', monospace; font-size: 15px; line-height: 1.6; }
      .backdrop { z-index: 1; pointer-events: none; color: transparent; }
      .backdrop .hl-header { color: #E5E5E5; font-weight: bold; }
      .backdrop .hl-bold { color: #E5E5E5; font-weight: bold; }
      .backdrop .hl-italic { font-style: italic; color: #E5E5E5; }
      .backdrop .hl-code { color: #7C3AED; background: rgba(124, 58, 237, 0.1); border-radius: 2px; }
      .backdrop .hl-link { color: #7C3AED; text-decoration: underline; }
      .backdrop .hl-list { color: #7C3AED; }
      .input-area { z-index: 2; color: #A3A3A3; caret-color: #7C3AED; resize: none; outline: none; background: transparent; }
      .glass { background: rgba(30, 30, 30, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "framer-motion": "https://esm.sh/framer-motion@^12.34.0",
    "obsidian": "https://esm.sh/obsidian@^1.12.0",
    "esbuild": "https://esm.sh/esbuild@^0.27.3",
    "process": "https://esm.sh/process@^0.11.10",
    "builtin-modules": "https://esm.sh/builtin-modules@^5.0.0",
    "zustand": "https://esm.sh/zustand@^5.0.11",
    "fs": "https://esm.sh/fs@^0.0.1-security"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <!-- Point to the bundled file output by esbuild -->
    <script src="./dist/bundle.js"></script>
  </body>
</html>
